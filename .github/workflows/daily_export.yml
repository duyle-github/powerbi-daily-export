name: Daily Power BI Export - MD_QDGP

on:
  schedule:
    - cron: '0 0 * * *'  # 7AM Singapore (UTC+7)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas Office365-REST-Python-Client playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Power BI Export
        env:
          PBI_USERNAME:      ${{ secrets.PBI_USERNAME }}
          PBI_PASSWORD:      ${{ secrets.PBI_PASSWORD }}
          WORKSPACE_ID:      ${{ secrets.WORKSPACE_ID }}
          DATASET_ID:        ${{ secrets.DATASET_ID }}
          CLIENT_ID:         ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET:     ${{ secrets.CLIENT_SECRET }}
          SHAREPOINT_SITE:   ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_FOLDER: ${{ secrets.SHAREPOINT_FOLDER }}
        run: python export_powerbi.py

      - name: Notify on failure
        if: failure()
        run: echo "Export failed! Check logs above."
